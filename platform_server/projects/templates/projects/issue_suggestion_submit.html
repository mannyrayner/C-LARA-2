{% extends "projects/base.html" %}
{% block title %}Submit issue suggestion{% endblock %}
{% block content %}
  <h1>Submit an issue suggestion</h1>
  <p>Use this form to suggest possible issues. Please keep it simple: title + description.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Submit suggestion</button>
  </form>
{% endblock %}
